<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI JS Drum Kit</title>
  <link rel="stylesheet" href="durm.css">
  <link rel="icon" href="https://fav.farm/✅" />
</head>
<body>

  <div class="keys">
    <div data-key="KeyA" class="key"><kbd>A</kbd><span class="sound">clap</span></div>
    <div data-key="KeyS" class="key"><kbd>S</kbd><span class="sound">hihat</span></div>
    <div data-key="KeyD" class="key"><kbd>D</kbd><span class="sound">kick</span></div>
    <div data-key="KeyF" class="key"><kbd>F</kbd><span class="sound">openhat</span></div>
    <div data-key="KeyG" class="key"><kbd>G</kbd><span class="sound">boom</span></div>
    <div data-key="KeyH" class="key"><kbd>H</kbd><span class="sound">ride</span></div>
    <div data-key="KeyJ" class="key"><kbd>J</kbd><span class="sound">snare</span></div>
    <div data-key="KeyK" class="key"><kbd>K</kbd><span class="sound">tom</span></div>
    <div data-key="KeyL" class="key"><kbd>L</kbd><span class="sound">tink</span></div>
  </div>

  <!-- Audio Files -->
  <audio data-key="KeyA" src="sounds/clap.wav"></audio>
  <audio data-key="KeyS" src="sounds/hihat.wav"></audio>
  <audio data-key="KeyD" src="sounds/kick.wav"></audio>
  <audio data-key="KeyF" src="sounds/openhat.wav"></audio>
  <audio data-key="KeyG" src="sounds/boom.wav"></audio>
  <audio data-key="KeyH" src="sounds/ride.wav"></audio>
  <audio data-key="KeyJ" src="sounds/snare.wav"></audio>
  <audio data-key="KeyK" src="sounds/tom.wav"></audio>
  <audio data-key="KeyL" src="sounds/tink.wav"></audio>

  <script>
    // --- 1. Core Logic: Sound & Animation ---
    function playSound(code) {
      const audio = document.querySelector(`audio[data-key="${code}"]`);
      const key = document.querySelector(`div[data-key="${code}"]`);
      
      if (!audio) return;

      key.classList.add('playing');
      audio.currentTime = 0; // Rewind to start
      audio.play();
    }

    function removeTransition(e) {
      if (e.propertyName !== 'transform') return;
      e.target.classList.remove('playing');
    }

    // --- 2. Event Listeners ---
    const keys = Array.from(document.querySelectorAll('.key'));
    keys.forEach(key => key.addEventListener('transitionend', removeTransition));

    window.addEventListener('keydown', (e) => {
      playSound(e.code); // e.code returns 'KeyA', 'KeyS' etc.
    });

    // --- 3. AI Voice Integration ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = true;

      recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
        recognition.onaudiostart = () => console.log("Mic ne awaaz sun-na shuru kar di hai...");
        console.log("AI Detected:", transcript);

        // Mapping Voice to Keys
        if (transcript.includes('clap')) playSound('KeyA');
        if (transcript.includes('hi hat')) playSound('KeyS');
        if (transcript.includes('kick')) playSound('KeyD');
        if (transcript.includes('boom')) playSound('KeyG');
        if (transcript.includes('open')) playSound('KeyF');
        if (transcript.includes('snare')) playSound('KeyJ');
      };

      recognition.start();
      console.log("AI Voice System Active. Try saying 'Clap' or 'Kick'!");
    } else {
      alert("Aapka browser AI Voice support nahi karta. Please Chrome use karein.");
    }
  </script>
</body>
</html>
